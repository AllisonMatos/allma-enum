<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Enum-Allma - Web Viewer Dashboard</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --border-color: #30363d;
            --accent-blue: #2f81f7;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            flex-direction: column;
        }

        .container {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 40px;
            width: 400px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        p {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 30px;
        }

        select {
            width: 100%;
            padding: 12px;
            background: var(--bg-color);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 16px;
            margin-bottom: 20px;
            outline: none;
            cursor: pointer;
        }

        select:focus {
            border-color: var(--accent-blue);
        }

        button {
            width: 100%;
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #388bfd;
        }

        button:disabled {
            background: var(--border-color);
            cursor: not-allowed;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>

    <svg viewBox="0 0 100 100" style="width: 60px; height: 60px; margin-bottom: 20px;">
        <g fill="#e6edf3">
            <path d="M30 45 Q50 15 70 45 L70 65 Q70 75 50 75 Q30 75 30 65 Z" />
            <circle cx="42" cy="55" r="5" fill="#161b22"/>
            <circle cx="58" cy="55" r="5" fill="#161b22"/>
            <path d="M40 70 L60 70 L60 75 L40 75 Z" fill="#161b22"/>
            <line x1="45" y1="70" x2="45" y2="75" stroke="#e6edf3" stroke-width="1"/>
            <line x1="50" y1="70" x2="50" y2="75" stroke="#e6edf3" stroke-width="1"/>
            <line x1="55" y1="70" x2="55" y2="75" stroke="#e6edf3" stroke-width="1"/>
        </g>
    </svg>

    <div class="container">
        <h1>Enum-Allma Viewer</h1>
        <p>Selecione um alvo no banco de dados para abrir o Web App Report interativo e seguro contra travamentos.</p>

        <select id="targetSelect">
            <option value="">Carregando alvos...</option>
        </select>

        <button id="openBtn" onclick="openReport()" disabled>Abrir Report</button>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const res = await fetch('/api/targets');
                const targets = await res.json();
                
                const select = document.getElementById('targetSelect');
                const btn = document.getElementById('openBtn');

                if (targets.length > 0) {
                    select.innerHTML = targets.map(t => `<option value="${t}">${t}</option>`).join('');
                    btn.disabled = false;
                } else {
                    select.innerHTML = '<option value="">Nenhum alvo encontrado no DB.</option>';
                }
            } catch(e) {
                console.error(e);
            }
        });

        function openReport() {
            const val = document.getElementById('targetSelect').value;
            if (val) {
                window.location.href = '/report/' + val;
            }
        }
    </script>
</body>
</html>
